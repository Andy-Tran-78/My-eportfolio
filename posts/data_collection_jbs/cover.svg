<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#f4f6f7"/>
  <rect width="1200" height="140" fill="#2c3e50"/>
  <text x="60" y="70" fill="#ffffff" font-size="44" font-weight="700">Weekly S&amp;OP Data Pipeline</text>
  <text x="60" y="112" fill="#18bc9c" font-size="24" font-weight="500">Automating multi-plant stock, sales &amp; finance consolidation in R</text>

  <!-- Stage 1: Raw exports -->
  <g>
    <rect x="60" y="250" width="230" height="150" rx="12" fill="#ffffff" stroke="#2c3e50" stroke-width="3"/>
    <text x="175" y="300" fill="#2c3e50" font-size="22" font-weight="700" text-anchor="middle">Raw weekly</text>
    <text x="175" y="328" fill="#2c3e50" font-size="22" font-weight="700" text-anchor="middle">exports</text>
    <text x="175" y="362" fill="#7b8a8b" font-size="16" text-anchor="middle">SOH · Dispatch · Sales</text>
    <text x="175" y="384" fill="#7b8a8b" font-size="16" text-anchor="middle">Finance · Forecast</text>
  </g>

  <!-- Arrow -->
  <g stroke="#18bc9c" stroke-width="5" fill="#18bc9c">
    <line x1="295" y1="325" x2="355" y2="325"/>
    <polygon points="355,313 380,325 355,337"/>
  </g>

  <!-- Stage 2: Master Code -->
  <g>
    <rect x="385" y="240" width="250" height="170" rx="12" fill="#18bc9c" stroke="#12987d" stroke-width="3"/>
    <text x="510" y="300" fill="#ffffff" font-size="24" font-weight="700" text-anchor="middle">Master Code</text>
    <text x="510" y="330" fill="#eafaf5" font-size="17" text-anchor="middle">Pick year + week</text>
    <text x="510" y="356" fill="#eafaf5" font-size="17" text-anchor="middle">Clean · join on Key</text>
    <text x="510" y="382" fill="#eafaf5" font-size="17" text-anchor="middle">(R · tidyverse)</text>
  </g>

  <!-- Arrow -->
  <g stroke="#18bc9c" stroke-width="5" fill="#18bc9c">
    <line x1="640" y1="325" x2="700" y2="325"/>
    <polygon points="700,313 725,325 700,337"/>
  </g>

  <!-- Stage 3: Weekly file -->
  <g>
    <rect x="730" y="250" width="180" height="150" rx="12" fill="#ffffff" stroke="#2c3e50" stroke-width="3"/>
    <text x="820" y="315" fill="#2c3e50" font-size="20" font-weight="700" text-anchor="middle">Weekly file</text>
    <text x="820" y="348" fill="#7b8a8b" font-size="16" text-anchor="middle">wWW_YYYY.xlsx</text>
  </g>

  <!-- Arrow -->
  <g stroke="#18bc9c" stroke-width="5" fill="#18bc9c">
    <line x1="915" y1="325" x2="975" y2="325"/>
    <polygon points="975,313 1000,325 975,337"/>
  </g>

  <!-- Stage 4: Combined database -->
  <g>
    <rect x="1005" y="250" width="150" height="150" rx="12" fill="#2c3e50" stroke="#1a252f" stroke-width="3"/>
    <text x="1080" y="312" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Combined</text>
    <text x="1080" y="338" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">database</text>
    <text x="1080" y="368" fill="#18bc9c" font-size="15" text-anchor="middle">for BI reports</text>
  </g>

  <text x="60" y="560" fill="#95a5a6" font-size="18">One repeatable workflow · many plants · one source of truth</text>
</svg>
