<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22303c"/>
      <stop offset="1" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1fd0ad"/>
      <stop offset="1" stop-color="#12987d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="70" y="95" fill="#ffffff" font-size="64" font-weight="800" letter-spacing="4">SQL</text>
  <text x="70" y="132" fill="#18bc9c" font-size="24" font-weight="500">Querying, joining &amp; shaping relational data</text>

  <!-- Database cylinder -->
  <g>
    <ellipse cx="240" cy="245" rx="120" ry="34" fill="#25e0ba"/>
    <path d="M120 245 L120 470 A120 34 0 0 0 360 470 L360 245" fill="url(#cyl)"/>
    <ellipse cx="240" cy="245" rx="120" ry="34" fill="#3ee9c6"/>
    <!-- disk separators -->
    <path d="M120 320 A120 34 0 0 0 360 320" fill="none" stroke="#0e7a64" stroke-width="3" opacity="0.6"/>
    <path d="M120 395 A120 34 0 0 0 360 395" fill="none" stroke="#0e7a64" stroke-width="3" opacity="0.6"/>
    <text x="240" y="255" fill="#0b3f34" font-size="30" font-weight="800" text-anchor="middle">DB</text>
  </g>

  <!-- relational tables + join motif -->
  <g>
    <rect x="120" y="520" width="95" height="70" rx="6" fill="#34495e" stroke="#18bc9c" stroke-width="2"/>
    <line x1="120" y1="542" x2="215" y2="542" stroke="#18bc9c" stroke-width="2"/>
    <line x1="120" y1="564" x2="215" y2="564" stroke="#4a6072" stroke-width="1.5"/>
    <rect x="285" y="520" width="95" height="70" rx="6" fill="#34495e" stroke="#18bc9c" stroke-width="2"/>
    <line x1="285" y1="542" x2="380" y2="542" stroke="#18bc9c" stroke-width="2"/>
    <line x1="285" y1="564" x2="380" y2="564" stroke="#4a6072" stroke-width="1.5"/>
    <line x1="215" y1="555" x2="285" y2="555" stroke="#f0ad4e" stroke-width="3"/>
    <circle cx="215" cy="555" r="5" fill="#f0ad4e"/>
    <circle cx="285" cy="555" r="5" fill="#f0ad4e"/>
    <text x="250" y="545" fill="#f0ad4e" font-size="14" font-weight="700" text-anchor="middle">JOIN</text>
  </g>

  <!-- Code editor panel -->
  <g>
    <rect x="470" y="175" width="690" height="360" rx="16" fill="#12212b" stroke="#3a4b5a" stroke-width="2"/>
    <rect x="470" y="175" width="690" height="42" rx="16" fill="#1b2c38"/>
    <circle cx="498" cy="196" r="7" fill="#e74c3c"/>
    <circle cx="522" cy="196" r="7" fill="#f0ad4e"/>
    <circle cx="546" cy="196" r="7" fill="#18bc9c"/>
    <text x="1120" y="201" fill="#5b7386" font-size="15" text-anchor="end" font-family="Consolas, monospace">query.sql</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="23">
      <text x="500" y="263"><tspan fill="#5cd6bd" font-weight="700">SELECT</tspan><tspan fill="#dfe6ea">  o.OrderNo, p.Product,</tspan></text>
      <text x="500" y="296"><tspan fill="#dfe6ea">        </tspan><tspan fill="#c9a0dc">sum</tspan><tspan fill="#dfe6ea">(l.Qty) </tspan><tspan fill="#5cd6bd">as</tspan><tspan fill="#dfe6ea"> TotalQty</tspan></text>
      <text x="500" y="329"><tspan fill="#5cd6bd" font-weight="700">FROM</tspan><tspan fill="#dfe6ea">    Orders o</tspan></text>
      <text x="500" y="362"><tspan fill="#5cd6bd" font-weight="700">JOIN</tspan><tspan fill="#dfe6ea">    OrderLines l </tspan><tspan fill="#5cd6bd">ON</tspan><tspan fill="#dfe6ea"> l.OrderId = o.Id</tspan></text>
      <text x="500" y="395"><tspan fill="#5cd6bd" font-weight="700">JOIN</tspan><tspan fill="#dfe6ea">    Products   p </tspan><tspan fill="#5cd6bd">ON</tspan><tspan fill="#dfe6ea"> p.Id = l.ProductId</tspan></text>
      <text x="500" y="428"><tspan fill="#5cd6bd" font-weight="700">WHERE</tspan><tspan fill="#dfe6ea">   o.SaleDate &gt;= </tspan><tspan fill="#f0ad4e">@StartDate</tspan></text>
      <text x="500" y="461"><tspan fill="#5cd6bd" font-weight="700">GROUP BY</tspan><tspan fill="#dfe6ea"> o.OrderNo, p.Product</tspan></text>
      <text x="500" y="500"><tspan fill="#5cd6bd" font-weight="700">ORDER BY</tspan><tspan fill="#dfe6ea"> o.OrderNo</tspan><tspan fill="#4a6072">;</tspan></text>
    </g>
  </g>
</svg>
